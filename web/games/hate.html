<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="utf-8">
<title>H.A.T.E! — Hostile All-Terrain Encounter (vector remake)</title>
<style>
  html,body{margin:0;padding:0;background:#000;height:100%;overflow:hidden;}
  #wrap{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;}
  canvas{background:#000;image-rendering:auto;}
</style>
</head>
<body>
<div id="wrap"><canvas id="cv" width="960" height="720"></canvas></div>
<script>
"use strict";
/* ============================================================
   H.A.T.E! — vector remake inspired by the ZX Spectrum game
   Hostile All-Terrain Encounter (Vortex Software, 1989).
   Fan homage, original code & vector art.
   Controls: Arrows = move, Space = fire, P = pause, M = mute
   ============================================================ */

const W = 960, H = 720;
const cv = document.getElementById('cv');
const ctx = cv.getContext('2d');

/* ---------- scaling ---------- */
function fit(){
  const s = Math.min(innerWidth / W, innerHeight / H);
  cv.style.width  = (W * s) + 'px';
  cv.style.height = (H * s) + 'px';
}
addEventListener('resize', fit); fit();

/* ---------- tiny 5x5 pixel font ---------- */
const FONT = {
 'A':["01110","10001","11111","10001","10001"],
 'B':["11110","10001","11110","10001","11110"],
 'C':["01111","10000","10000","10000","01111"],
 'D':["11110","10001","10001","10001","11110"],
 'E':["11111","10000","11110","10000","11111"],
 'F':["11111","10000","11110","10000","10000"],
 'G':["01111","10000","10011","10001","01111"],
 'H':["10001","10001","11111","10001","10001"],
 'I':["11111","00100","00100","00100","11111"],
 'K':["10001","10010","11100","10010","10001"],
 'L':["10000","10000","10000","10000","11111"],
 'M':["10001","11011","10101","10001","10001"],
 'N':["10001","11001","10101","10011","10001"],
 'O':["01110","10001","10001","10001","01110"],
 'P':["11110","10001","11110","10000","10000"],
 'R':["11110","10001","11110","10010","10001"],
 'S':["01111","10000","01110","00001","11110"],
 'T':["11111","00100","00100","00100","00100"],
 'U':["10001","10001","10001","10001","01110"],
 'V':["10001","10001","10001","01010","00100"],
 'W':["10001","10001","10101","11011","10001"],
 'X':["10001","01010","00100","01010","10001"],
 'Y':["10001","01010","00100","00100","00100"],
 'Z':["11111","00010","00100","01000","11111"],
 '0':["01110","10011","10101","11001","01110"],
 '1':["00100","01100","00100","00100","01110"],
 '2':["11110","00001","01110","10000","11111"],
 '3':["11110","00001","01110","00001","11110"],
 '4':["10001","10001","11111","00001","00001"],
 '5':["11111","10000","11110","00001","11110"],
 '6':["01110","10000","11110","10001","01110"],
 '7':["11111","00001","00010","00100","00100"],
 '8':["01110","10001","01110","10001","01110"],
 '9':["01110","10001","01111","00001","01110"],
 '.':["00000","00000","00000","00000","00100"],
 '!':["00100","00100","00100","00000","00100"],
 '-':["00000","00000","01110","00000","00000"],
 ':':["00000","00100","00000","00100","00000"],
 '/':["00001","00010","00100","01000","10000"]
};
function drawText(s, x, y, sc, col){
  ctx.fillStyle = col;
  let cx = x;
  for(const ch of s){
    const g = FONT[ch];
    if(g){
      for(let r = 0; r < 5; r++){
        const row = g[r];
        for(let c = 0; c < 5; c++)
          if(row[c] === '1') ctx.fillRect(cx + c * sc, y + r * sc, sc, sc);
      }
    }
    cx += 6 * sc;
  }
}
function textW(s, sc){ return s.length * 6 * sc - sc; }

/* ---------- helpers ---------- */
function clamp(a, lo, hi){ return a < lo ? lo : (a > hi ? hi : a); }
function lerp(a, b, t){ return a + (b - a) * clamp(t, 0, 1); }
function mulberry32(seed){
  let a = seed >>> 0;
  return function(){
    a |= 0; a = (a + 0x6D2B79F5) | 0;
    let t = Math.imul(a ^ (a >>> 15), 1 | a);
    t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
    return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
  };
}

/* ---------- iso projection ---------- */
const TW = 26, TH = 13, HZ = 16;      // tile half-width/height, height unit
const VW = 10, ULEN = 260;            // strip width (tiles), strip length
function isoX(u, v){ return (u + v) * TW; }
function isoY(u, v, h){ return (v - u) * TH - h * HZ; }

/* ---------- ZX palette + level colour cycle (yellow, cyan, green, magenta) ---------- */
const LVL_COLS = ['#f8f800', '#00f8f8', '#00f800', '#f800f8'];
const RED = '#d80000', BRED = '#f81400', MAG = '#c000c0', GREY = '#c8c8c8';

function makePat(col, kind){
  const c = document.createElement('canvas'); c.width = 4; c.height = 4;
  const g = c.getContext('2d');
  g.fillStyle = '#000'; g.fillRect(0, 0, 4, 4);
  g.fillStyle = col;
  if(kind === 50){ g.fillRect(0, 0, 2, 2); g.fillRect(2, 2, 2, 2); }
  else { g.fillRect(0, 0, 2, 2); }               // 25 %
  return ctx.createPattern(c, 'repeat');
}

/* ---------- audio (ZX-ish beeps) ---------- */
let AC = null, muted = false;
function audio(){ if(!AC){ try{ AC = new (window.AudioContext || window.webkitAudioContext)(); }catch(e){} } }
function beep(f0, f1, dur, vol, type){
  if(!AC || muted) return;
  const o = AC.createOscillator(), g = AC.createGain(), t = AC.currentTime;
  o.type = type || 'square';
  o.frequency.setValueAtTime(f0, t);
  o.frequency.exponentialRampToValueAtTime(Math.max(30, f1), t + dur);
  g.gain.setValueAtTime(vol, t);
  g.gain.exponentialRampToValueAtTime(0.001, t + dur);
  o.connect(g); g.connect(AC.destination);
  o.start(t); o.stop(t + dur + 0.02);
}
function sfxShoot(){ beep(1400, 300, 0.08, 0.05); }
function sfxExpl(){ beep(300, 40, 0.3, 0.12, 'sawtooth'); beep(150, 30, 0.4, 0.1); }
function sfxPickup(){ beep(600, 600, 0.06, 0.07); setTimeout(()=>beep(900, 900, 0.08, 0.07), 70); }
function sfxCrash(){ beep(200, 25, 0.5, 0.15, 'sawtooth'); }
function sfxHit(){ beep(500, 100, 0.12, 0.08); }
function sfxLife(){ [523,659,784,1047].forEach((f,i)=>setTimeout(()=>beep(f,f,0.09,0.08),i*90)); }
function sfxLevel(){ [392,523,659,784,1047].forEach((f,i)=>setTimeout(()=>beep(f,f,0.11,0.08),i*110)); }

/* ---------- game state ---------- */
let state = 'title';        // title | play | over
let lvl = 1;
let terr = null;            // {h, dark, ents, trig, col, pat50, pat25}
let P = null;               // player
let shots = [], eshots = [], flyers = [], parts = [], rings = [];
let cam = {x:0, y:0}, shake = 0;
let introT = 0, doneT = 0, tGlobal = 0, paused = false;
let scoreF = 0, hiScore = 0;
try{ hiScore = +(localStorage.getItem('hate_hi') || 0) || 0; }catch(e){}

const keys = {};
addEventListener('keydown', e => {
  if(['ArrowUp','ArrowDown','ArrowLeft','ArrowRight',' '].includes(e.key)) e.preventDefault();
  audio();
  if(e.repeat) return;
  keys[e.key] = true;
  if(e.key === 'm' || e.key === 'M') muted = !muted;
  if(e.key === 'p' || e.key === 'P') if(state === 'play') paused = !paused;
  if(e.key === ' ' || e.key === 'Enter'){
    if(state === 'title') startGame();
    else if(state === 'over'){ state = 'title'; }
  }
});
addEventListener('keyup', e => { keys[e.key] = false; });

/* ---------- level generation ---------- */
function genLevel(lv){
  const rnd = mulberry32(lv * 7919 + 1013);
  /* corner height field (floats -> slopes) + per-tile lift (integer -> vertical blocks) */
  const ch = [];
  for(let u = 0; u <= ULEN; u++) ch.push(new Float32Array(VW + 1));
  const lift = [], dark = [];
  for(let u = 0; u < ULEN; u++){ lift.push(new Int8Array(VW)); dark.push(new Uint8Array(VW)); }

  /* raised patch with sloped skirts — the ramp hills of the original */
  function hill(u0, u1, v0, v1, hh){
    const su = 2 * hh, sv = hh + 1;
    for(let k = Math.max(0, u0 - su); k <= Math.min(ULEN, u1 + su); k++)
      for(let v = Math.max(0, v0 - sv); v <= Math.min(VW, v1 + sv); v++){
        const fu = k < u0 ? 1 - (u0 - k) / su : (k > u1 ? 1 - (k - u1) / su : 1);
        const fv = v < v0 ? 1 - (v0 - v) / sv : (v > v1 ? 1 - (v - v1) / sv : 1);
        ch[k][v] += hh * Math.max(0, Math.min(fu, fv));
      }
  }

  const base = new Float32Array(ULEN + 1);
  let b = 0, u = 14;
  while(u < ULEN - 24){
    const r = rnd();
    if(r < 0.26){ u += 6 + (rnd() * 10 | 0); }
    else if(r < 0.52){                                       // base elevation ramp
      const de = (rnd() < 0.5 && b > 0) ? -1 : (b < 3 ? 1 : -1);
      const len = 2 + (rnd() * 3 | 0);
      for(let k = 0; k <= len; k++) base[Math.min(ULEN, u + k)] = b + de * (k / len);
      b += de;
      for(let k = Math.min(ULEN, u + len); k <= ULEN; k++) base[k] = b;
      u += len + 4 + (rnd() * 6 | 0);
    } else if(r < 0.74){                                     // hill (sloped) or block plateau (vertical)
      const du = 8 + (rnd() * 12 | 0);
      const v0 = rnd() * 6 | 0, v1 = Math.min(VW - 1, v0 + 2 + (rnd() * 4 | 0));
      const hh = 1 + (rnd() * 2 | 0);
      if(rnd() < 0.55) hill(u, Math.min(ULEN, u + du), v0, v1 + 1, hh);
      else
        for(let k = u; k < Math.min(ULEN, u + du); k++)
          for(let v = v0; v <= v1; v++) lift[k][v] += hh;
      u += du + 3;
    } else if(r < 0.88){                                     // wall with a gap
      const gv = 1 + (rnd() * (VW - 4) | 0);
      for(let k = u; k < u + 2; k++)
        for(let v = 0; v < VW; v++)
          if(v < gv || v > gv + 2) lift[k][v] += 4;
      u += 12 + (rnd() * 10 | 0);
    } else {                                                 // dithered dark patch
      const du = 6 + (rnd() * 10 | 0);
      const v0 = rnd() * 7 | 0, v1 = Math.min(VW - 1, v0 + 2 + (rnd() * 5 | 0));
      for(let k = u; k < Math.min(ULEN, u + du); k++)
        for(let v = v0; v <= v1; v++) if(rnd() < 0.9) dark[k][v] = 1;
      u += du;
    }
  }
  for(let k = 0; k <= ULEN; k++)
    for(let v = 0; v <= VW; v++) ch[k][v] += base[k];

  /* entities */
  const ents = [], trig = [];
  let uu = 24;
  while(uu < ULEN - 30){
    const r = rnd();
    if(r < 0.42){
      const v = 1 + (rnd() * (VW - 2) | 0);
      ents.push({t:'turret', u:uu + 0.5, v:v + 0.5, hp:2, cool:1 + rnd() * 2});
      if(lv > 2 && rnd() < 0.4){
        const v2 = 1 + (rnd() * (VW - 2) | 0);
        ents.push({t:'turret', u:uu + 2.5, v:v2 + 0.5, hp:2, cool:1 + rnd() * 2});
      }
    } else if(r < 0.75){
      const n = 1 + (rnd() * 3 | 0), v = 1 + (rnd() * (VW - 3) | 0);
      for(let i = 0; i < n; i++) ents.push({t:'cell', u:uu + 0.5, v:Math.min(VW - 1, v + i) + 0.5});
    } else trig.push({u:uu, n:1 + (rnd() * Math.min(3, 1 + lv * 0.5) | 0), done:false});
    uu += Math.max(6, 13 - lv) + (rnd() * 12 | 0);
  }
  const col = LVL_COLS[(lv - 1) % 4];
  return {ch, lift, dark, ents, trig, col, pat50:makePat(col, 50), pat25:makePat(col, 25)};
}
function groundAt(u, v){
  const iu = clamp(Math.floor(u), 0, ULEN - 1), iv = clamp(Math.floor(v), 0, VW - 1);
  const fu = clamp(u - iu, 0, 1), fv = clamp(v - iv, 0, 1);
  const c = terr.ch;
  const h = (c[iu][iv] * (1 - fu) + c[iu + 1][iv] * fu) * (1 - fv)
          + (c[iu][iv + 1] * (1 - fu) + c[iu + 1][iv + 1] * fu) * fv;
  return h + terr.lift[iu][iv];
}

/* ---------- game flow ---------- */
function startGame(){
  lvl = 1; scoreF = 0;
  P = {u:4, v:VW / 2, alt:1.5, bank:0, energy:4, lives:3, cells:0, inv:2, cool:0, dead:0};
  loadLevel();
  state = 'play'; paused = false;
}
function loadLevel(){
  terr = genLevel(lvl);
  shots = []; eshots = []; flyers = []; parts = []; rings = [];
  P.u = 4; P.v = VW / 2; P.alt = groundAt(4, P.v) + 1.5; P.inv = 2;
  introT = 2; doneT = 0;
}
function explode(u, v, alt, big){
  const x = isoX(u, v), y = isoY(u, v, alt);
  const n = big ? 26 : 14;
  for(let i = 0; i < n; i++){
    const a = Math.random() * 6.283, sp = 30 + Math.random() * 130;
    parts.push({u, v, alt, ox:0, oy:0,
      vx:Math.cos(a) * sp, vy:Math.sin(a) * sp * 0.6 - 40,
      life:0.5 + Math.random() * 0.5,
      col:['#fff', BRED, terr.col, '#fff'][i % 4]});
  }
  rings.push({u, v, alt, r:4, life:0.35});
  shake = Math.min(10, shake + (big ? 8 : 4));
}
function damage(){
  if(P.inv > 0) return;
  P.energy--; P.inv = 2; sfxHit();
  if(P.energy <= 0){
    P.lives--; sfxCrash();
    explode(P.u, P.v, P.alt, true);
    if(P.lives < 0){
      state = 'over';
      if(Math.floor(scoreF) > hiScore){
        hiScore = Math.floor(scoreF);
        try{ localStorage.setItem('hate_hi', hiScore); }catch(e){}
      }
      return;
    }
    P.energy = 4;
    P.u = Math.max(2, P.u - 8); P.v = VW / 2;
    P.alt = groundAt(P.u, P.v) + 1.5; P.inv = 3;
  }
}

/* ---------- update ---------- */
function update(dt){
  tGlobal += dt;
  if(state !== 'play' || paused) return;
  if(introT > 0) introT -= dt;
  if(doneT > 0){
    doneT -= dt;
    if(doneT <= 0){ lvl++; loadLevel(); }
    return;
  }
  P.inv = Math.max(0, P.inv - dt);
  P.cool = Math.max(0, P.cool - dt);

  /* movement */
  let spd = 5 + lvl * 0.25;
  if(keys.ArrowUp) spd *= 1.6;
  if(keys.ArrowDown) spd *= 0.45;
  P.u += spd * dt;
  let vv = 0;
  if(keys.ArrowLeft) vv -= 4.4;
  if(keys.ArrowRight) vv += 4.4;
  P.v = clamp(P.v + vv * dt, 0.4, VW - 0.4);
  P.bank = lerp(P.bank, vv / 4.4, 10 * dt);

  /* terrain hover + wall crash */
  const th = groundAt(P.u + 0.35, P.v);
  if(th > P.alt + 0.7){
    if(P.inv <= 0){
      explode(P.u, P.v, P.alt, false); sfxCrash(); damage();
      P.u = Math.max(2, P.u - 5);
      P.alt = groundAt(P.u, P.v) + 1.5; P.inv = Math.max(P.inv, 2);
    }
  } else {
    const tgt = th + 1.5;
    P.alt = (tgt > P.alt) ? Math.min(tgt, P.alt + 9 * dt) : lerp(P.alt, tgt, 6 * dt);
  }

  /* fire */
  if(keys[' '] && P.cool <= 0){
    P.cool = 0.22;
    shots.push({u:P.u + 0.9, v:P.v, alt:P.alt, d:0});
    sfxShoot();
  }
  for(let i = shots.length - 1; i >= 0; i--){
    const s = shots[i];
    s.u += 17 * dt; s.d += 17 * dt;
    if(s.d > 15 || groundAt(s.u, s.v) > s.alt){ shots.splice(i, 1); continue; }
  }

  /* score for distance */
  scoreF += spd * dt * 2;

  /* entities */
  for(let i = terr.ents.length - 1; i >= 0; i--){
    const e = terr.ents[i];
    if(e.u < P.u - 18 || e.u > P.u + 36) continue;
    if(e.t === 'turret'){
      e.cool -= dt;
      const du = e.u - P.u;
      if(e.cool <= 0 && du > 2 && du < 15){
        e.cool = 2.4 - Math.min(1.2, lvl * 0.12) + Math.random();
        const eh = groundAt(e.u, e.v) + 0.9;
        const dx = (P.u + spd * 0.25) - e.u, dy = P.v - e.v;
        const d = Math.hypot(dx, dy) || 1, T = d / 8;
        eshots.push({u:e.u, v:e.v, alt:eh, vu:dx / d * 8, vv:dy / d * 8, va:(P.alt - eh) / T});
        beep(900, 200, 0.1, 0.04);
      }
      /* player shots vs turret */
      for(let j = shots.length - 1; j >= 0; j--){
        const s = shots[j];
        if(Math.abs(s.u - e.u) < 0.7 && Math.abs(s.v - e.v) < 0.8 && Math.abs(s.alt - (groundAt(e.u,e.v) + 0.9)) < 1.7){
          shots.splice(j, 1); e.hp--;
          if(e.hp <= 0){
            explode(e.u, e.v, groundAt(e.u, e.v) + 0.9, false); sfxExpl();
            scoreF += 150; terr.ents.splice(i, 1);
          } else beep(700, 300, 0.06, 0.05);
          break;
        }
      }
    } else if(e.t === 'cell'){
      if(Math.abs(e.u - P.u) < 0.8 && Math.abs(e.v - P.v) < 0.8){
        terr.ents.splice(i, 1);
        scoreF += 300; P.cells++;
        sfxPickup();
        if(P.cells % 5 === 0){ P.lives = Math.min(8, P.lives + 1); sfxLife(); }
      }
    }
  }

  /* flyer waves */
  for(const tg of terr.trig){
    if(!tg.done && P.u > tg.u - 26){
      tg.done = true;
      for(let i = 0; i < tg.n; i++)
        flyers.push({u:P.u + 26 + i * 4, v0:1 + Math.random() * (VW - 2), v:0, ph:Math.random() * 6.28, alt:3, cool:1 + Math.random()});
    }
  }
  for(let i = flyers.length - 1; i >= 0; i--){
    const f = flyers[i];
    f.u -= 3.6 * dt;
    f.v = clamp(f.v0 + Math.sin(tGlobal * 2.2 + f.ph) * 1.8, 0.4, VW - 0.4);
    const fh = groundAt(f.u, f.v) + 1.6;
    f.alt = lerp(f.alt, fh, 5 * dt);
    f.cool -= dt;
    const du = f.u - P.u;
    if(f.cool <= 0 && du > 3 && du < 16){
      f.cool = 2.6 + Math.random();
      const dx = P.u - f.u, dy = P.v - f.v;
      const d = Math.hypot(dx, dy) || 1, T = d / 9;
      eshots.push({u:f.u, v:f.v, alt:f.alt, vu:dx / d * 9, vv:dy / d * 9, va:(P.alt - f.alt) / T});
    }
    if(du < -6){ flyers.splice(i, 1); continue; }
    /* collide with player */
    if(Math.abs(du) < 0.9 && Math.abs(f.v - P.v) < 0.9 && Math.abs(f.alt - P.alt) < 1.2){
      explode(f.u, f.v, f.alt, false); sfxExpl();
      flyers.splice(i, 1); damage(); continue;
    }
    /* player shots vs flyer */
    for(let j = shots.length - 1; j >= 0; j--){
      const s = shots[j];
      if(Math.abs(s.u - f.u) < 0.8 && Math.abs(s.v - f.v) < 0.9 && Math.abs(s.alt - f.alt) < 1.4){
        shots.splice(j, 1);
        explode(f.u, f.v, f.alt, false); sfxExpl();
        scoreF += 100; flyers.splice(i, 1);
        break;
      }
    }
  }

  /* enemy shots */
  for(let i = eshots.length - 1; i >= 0; i--){
    const s = eshots[i];
    s.u += s.vu * dt; s.v += s.vv * dt; s.alt += s.va * dt;
    if(s.u < P.u - 8 || s.u > P.u + 30 || s.v < -1 || s.v > VW + 1 || groundAt(s.u, s.v) > s.alt){
      eshots.splice(i, 1); continue;
    }
    if(Math.abs(s.u - P.u) < 0.55 && Math.abs(s.v - P.v) < 0.6 && Math.abs(s.alt - P.alt) < 1){
      eshots.splice(i, 1);
      explode(P.u, P.v, P.alt, false);
      damage();
    }
  }

  /* particles */
  for(let i = parts.length - 1; i >= 0; i--){
    const p = parts[i];
    p.life -= dt;
    p.ox += p.vx * dt; p.oy += p.vy * dt; p.vy += 160 * dt;
    if(p.life <= 0) parts.splice(i, 1);
  }
  for(let i = rings.length - 1; i >= 0; i--){
    rings[i].r += 180 * (1/60); rings[i].life -= dt;
    if(rings[i].life <= 0) rings.splice(i, 1);
  }
  shake = Math.max(0, shake - 30 * dt);

  /* level complete */
  if(P.u > ULEN - 8 && doneT <= 0){
    doneT = 2.2;
    scoreF += P.cells * 50;
    sfxLevel();
  }
}

/* ---------- drawing: world ---------- */
function tileCorners(u, v){
  const L = terr.lift[u][v], c = terr.ch;
  return [c[u][v] + L, c[u + 1][v] + L, c[u + 1][v + 1] + L, c[u][v + 1] + L];
}
function drawTileFaces(u, v){
  const t = terr;
  const [h00, h10, h11, h01] = tileCorners(u, v);
  const x0 = isoX(u, v)         - cam.x, y0 = isoY(u, v, h00)         - cam.y;
  const x1 = isoX(u + 1, v)     - cam.x, y1 = isoY(u + 1, v, h10)     - cam.y;
  const x2 = isoX(u + 1, v + 1) - cam.x, y2 = isoY(u + 1, v + 1, h11) - cam.y;
  const x3 = isoX(u, v + 1)     - cam.x, y3 = isoY(u, v + 1, h01)     - cam.y;

  /* left face (-u): drawn where this tile's near edge rises above the previous tile's far edge */
  let n00 = -2, n01 = -2;
  if(u > 0){ const nb = tileCorners(u - 1, v); n00 = nb[1]; n01 = nb[2]; }
  if(h00 > n00 + 0.01 || h01 > n01 + 0.01){
    const yb0 = isoY(u, v, Math.min(n00, h00)) - cam.y;
    const yb3 = isoY(u, v + 1, Math.min(n01, h01)) - cam.y;
    ctx.fillStyle = t.pat25;
    ctx.beginPath();
    ctx.moveTo(x0, y0); ctx.lineTo(x3, y3); ctx.lineTo(x3, yb3); ctx.lineTo(x0, yb0);
    ctx.closePath(); ctx.fill();
    ctx.strokeStyle = '#000'; ctx.lineWidth = 1; ctx.stroke();
  }
  /* right face (+v): drawn where higher than the next column's near edge (or strip edge) */
  let m01 = -2, m11 = -2;
  if(v < VW - 1){ const nb = tileCorners(u, v + 1); m01 = nb[0]; m11 = nb[1]; }
  if(h01 > m01 + 0.01 || h11 > m11 + 0.01){
    const yb3 = isoY(u, v + 1, Math.min(m01, h01)) - cam.y;
    const yb2 = isoY(u + 1, v + 1, Math.min(m11, h11)) - cam.y;
    ctx.fillStyle = t.pat50;
    ctx.beginPath();
    ctx.moveTo(x3, y3); ctx.lineTo(x2, y2); ctx.lineTo(x2, yb2); ctx.lineTo(x3, yb3);
    ctx.closePath(); ctx.fill();
    ctx.strokeStyle = '#000'; ctx.lineWidth = 1; ctx.stroke();
  }
  /* top face — slopes falling toward the viewer get dither shading */
  const shade = t.dark[u][v] || (h01 + h11) - (h00 + h10) < -0.5;
  ctx.fillStyle = shade ? t.pat50 : t.col;
  ctx.beginPath();
  ctx.moveTo(x0, y0); ctx.lineTo(x1, y1); ctx.lineTo(x2, y2); ctx.lineTo(x3, y3);
  ctx.closePath(); ctx.fill();
  ctx.strokeStyle = '#000'; ctx.lineWidth = 1; ctx.stroke();
}

/* forward/side unit vectors in screen space */
const FX = 2 / Math.sqrt(5), FY = -1 / Math.sqrt(5);
const SX = 2 / Math.sqrt(5), SY = 1 / Math.sqrt(5);   // iso +v axis — wings lie in the ground plane

function drawCraft(x, y, dir, bank, fill, sc, outline){
  const fx = FX * dir, fy = FY * dir;
  const nX = x + fx * 16 * sc,           nY = y + fy * 16 * sc;
  const wrX = x - fx * 9 * sc + SX * 13 * sc, wrY = y - fy * 9 * sc + SY * 13 * sc + bank * 5;
  const wlX = x - fx * 9 * sc - SX * 13 * sc, wlY = y - fy * 9 * sc - SY * 13 * sc - bank * 5;
  const ntX = x - fx * 4 * sc,           ntY = y - fy * 4 * sc;
  ctx.fillStyle = fill;
  ctx.beginPath();
  ctx.moveTo(nX, nY); ctx.lineTo(wrX, wrY); ctx.lineTo(ntX, ntY); ctx.lineTo(wlX, wlY);
  ctx.closePath(); ctx.fill();
  ctx.strokeStyle = outline; ctx.lineWidth = 1.5; ctx.stroke();
  /* tail fin */
  ctx.beginPath();
  ctx.moveTo(x - fx * 2 * sc, y - fy * 2 * sc);
  ctx.lineTo(x - fx * 9 * sc, y - fy * 9 * sc - 9 * sc);
  ctx.lineTo(x - fx * 9 * sc, y - fy * 9 * sc);
  ctx.closePath(); ctx.fill(); ctx.stroke();
  /* canopy */
  ctx.fillStyle = '#222';
  ctx.beginPath(); ctx.arc(x + fx * 6 * sc, y + fy * 6 * sc - 1, 2.6 * sc, 0, 6.283); ctx.fill();
}

function drawShadow(u, v){
  const gh = groundAt(u, v);
  const x = isoX(u, v) - cam.x, y = isoY(u, v, gh) - cam.y;
  ctx.save();
  ctx.translate(x, y); ctx.rotate(-0.4636);
  ctx.fillStyle = 'rgba(0,0,0,0.55)';
  ctx.beginPath(); ctx.ellipse(0, 0, 13, 5.5, 0, 0, 6.283); ctx.fill();
  ctx.restore();
}

function drawTurret(e){
  const gh = groundAt(e.u, e.v);
  const x = isoX(e.u, e.v) - cam.x, y = isoY(e.u, e.v, gh) - cam.y;
  /* pedestal */
  ctx.fillStyle = terr.pat25;
  ctx.beginPath();
  ctx.moveTo(x - 8, y); ctx.lineTo(x + 8, y); ctx.lineTo(x + 6, y - 8); ctx.lineTo(x - 6, y - 8);
  ctx.closePath(); ctx.fill();
  ctx.strokeStyle = '#000'; ctx.lineWidth = 1; ctx.stroke();
  /* sphere */
  ctx.fillStyle = terr.pat50;
  ctx.beginPath(); ctx.arc(x, y - 16, 9, 0, 6.283); ctx.fill();
  ctx.strokeStyle = '#000'; ctx.lineWidth = 1.5; ctx.stroke();
  ctx.fillStyle = terr.col;
  ctx.beginPath(); ctx.arc(x - 3, y - 19, 3, 0, 6.283); ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.fillRect(x - 4, y - 20, 2, 2);
}

function drawCell(e){
  const gh = groundAt(e.u, e.v);
  const x = isoX(e.u, e.v) - cam.x, y = isoY(e.u, e.v, gh) - cam.y;
  const bob = Math.sin(tGlobal * 4 + e.u) * 1.5;
  for(let i = -1; i <= 1; i++){
    const cx = x + i * 6, cy = y - 8 + bob + Math.abs(i) * 2;
    ctx.fillStyle = terr.pat50;
    ctx.fillRect(cx - 2.5, cy - 9, 5, 9);
    ctx.strokeStyle = '#000'; ctx.lineWidth = 1;
    ctx.strokeRect(cx - 2.5, cy - 9, 5, 9);
    ctx.fillStyle = '#fff';
    ctx.fillRect(cx - 2.5, cy - 11, 5, 2.5);
  }
}

function drawStars(){
  const rnd = mulberry32(777);
  ctx.fillStyle = '#fff';
  for(let i = 0; i < 70; i++){
    let x = rnd() * W, y = rnd() * H;
    x = (x - cam.x * 0.06 % W + W * 2) % W;
    y = (y - cam.y * 0.06 % H + H * 2) % H;
    ctx.globalAlpha = 0.3 + rnd() * 0.7;
    ctx.fillRect(x, y, 2, 2);
  }
  ctx.globalAlpha = 1;
  /* yellow speck cluster (left edge, like the loading screen dust) */
  const r2 = mulberry32(1234);
  ctx.fillStyle = '#f8f800';
  for(let i = 0; i < 16; i++)
    ctx.fillRect(6 + r2() * 40, 60 + r2() * 160, 2, 2);
}

function drawStreaks(){
  /* purple diagonal hatch streaks, like the original backdrop */
  ctx.strokeStyle = MAG; ctx.lineWidth = 3;
  const g = [[620, 14, 10], [10, 210, 7], [880, 360, 5]];
  for(const [gx, gy, n] of g){
    for(let i = 0; i < n; i++){
      ctx.beginPath();
      ctx.moveTo(gx + i * 9, gy + 34);
      ctx.lineTo(gx + i * 9 + 24, gy);
      ctx.stroke();
    }
  }
}

function renderWorld(fu, fv, showPlayer){
  /* camera */
  const px = isoX(fu, fv), py = isoY(fu, fv, showPlayer ? P.alt : 2);
  cam.x = px - 400 + (Math.random() - 0.5) * shake;
  cam.y = py - 470 + (Math.random() - 0.5) * shake;

  drawStars();
  drawStreaks();

  const u0 = clamp(Math.floor(fu) - 16, 0, ULEN - 1);
  const u1 = clamp(Math.floor(fu) + 34, 0, ULEN - 1);

  /* collect depth-sorted draw items */
  const items = [];
  for(let u = u0; u <= u1; u++)
    for(let v = 0; v < VW; v++)
      items.push({d:v - u, k:0, u, v});
  for(const e of terr.ents){
    if(e.u < u0 || e.u > u1) continue;
    items.push({d:e.v - e.u + 0.5, k:1, e});
  }
  for(const f of flyers){
    if(f.u < u0 || f.u > u1) continue;
    items.push({d:f.v - f.u + 0.5, k:2, e:f});
  }
  if(showPlayer) items.push({d:P.v - P.u + 0.55, k:3});
  items.sort((a, b) => a.d - b.d);

  for(const it of items){
    if(it.k === 0) drawTileFaces(it.u, it.v);
    else if(it.k === 1){
      if(it.e.t === 'turret') drawTurret(it.e);
      else drawCell(it.e);
    }
    else if(it.k === 2){
      const f = it.e;
      drawShadow(f.u, f.v);
      const x = isoX(f.u, f.v) - cam.x, y = isoY(f.u, f.v, f.alt) - cam.y;
      drawCraft(x, y, -1, 0, terr.pat50, 0.9, '#000');
    }
    else if(it.k === 3){
      const blink = P.inv > 0 && (Math.floor(tGlobal * 10) % 2 === 0);
      if(!blink){
        drawShadow(P.u, P.v);
        const x = isoX(P.u, P.v) - cam.x, y = isoY(P.u, P.v, P.alt) - cam.y;
        if(keys.ArrowUp){
          ctx.fillStyle = '#f8f800';
          ctx.beginPath();
          ctx.moveTo(x - FX * 12, y - FY * 12 + 2);
          ctx.lineTo(x - FX * 22, y - FY * 22 + 4 + Math.random() * 3);
          ctx.lineTo(x - FX * 12, y - FY * 12 + 6);
          ctx.closePath(); ctx.fill();
        }
        drawCraft(x, y, 1, P.bank, '#e0e0e0', 1, '#000');
      }
    }
  }

  /* shots on top */
  ctx.lineWidth = 3; ctx.strokeStyle = '#fff';
  for(const s of shots){
    const x = isoX(s.u, s.v) - cam.x, y = isoY(s.u, s.v, s.alt) - cam.y;
    ctx.beginPath();
    ctx.moveTo(x - FX * 6, y - FY * 6); ctx.lineTo(x + FX * 6, y + FY * 6);
    ctx.stroke();
  }
  for(const s of eshots){
    const x = isoX(s.u, s.v) - cam.x, y = isoY(s.u, s.v, s.alt) - cam.y;
    ctx.fillStyle = (Math.floor(tGlobal * 16) % 2) ? '#fff' : BRED;
    ctx.beginPath(); ctx.arc(x, y, 4, 0, 6.283); ctx.fill();
    ctx.strokeStyle = '#000'; ctx.lineWidth = 1; ctx.stroke();
    ctx.strokeStyle = '#fff'; ctx.lineWidth = 3;
  }

  /* particles & rings */
  for(const p of parts){
    const x = isoX(p.u, p.v) - cam.x + p.ox, y = isoY(p.u, p.v, p.alt) - cam.y + p.oy;
    ctx.fillStyle = p.col;
    ctx.fillRect(x - 2, y - 2, 4, 4);
  }
  ctx.lineWidth = 2;
  for(const r of rings){
    const x = isoX(r.u, r.v) - cam.x, y = isoY(r.u, r.v, r.alt) - cam.y;
    ctx.strokeStyle = 'rgba(255,255,255,' + Math.max(0, r.life * 2.5) + ')';
    ctx.beginPath(); ctx.arc(x, y, r.r, 0, 6.283); ctx.stroke();
  }
}

/* ---------- drawing: HUD ---------- */
function drawLogo(x, y, sc){
  const bw = 184 * sc, bh = 46 * sc;
  ctx.fillStyle = '#000'; ctx.fillRect(x, y, bw, bh);
  ctx.strokeStyle = GREY; ctx.lineWidth = 2;
  ctx.strokeRect(x, y, bw, bh);
  drawText('H.A.T.E!', x + 8 * sc, y + 5 * sc, 3.6 * sc, BRED);
  /* magenta squares */
  ctx.fillStyle = MAG;
  ctx.fillRect(x + 60 * sc, y + 26 * sc, 5 * sc, 5 * sc);
  ctx.fillRect(x + 128 * sc, y + 26 * sc, 5 * sc, 5 * sc);
  /* subtitle chip strip */
  ctx.fillStyle = GREY;
  ctx.fillRect(x + 4 * sc, y + bh - 11 * sc, bw - 8 * sc, 9 * sc);
  drawText('HOSTILE ALL-TERRAIN ENCOUNTER', x + 6 * sc, y + bh - 9.5 * sc, sc, '#000');
}

function drawEnergy(x, y){
  /* red capsule with segments */
  ctx.strokeStyle = BRED; ctx.lineWidth = 5;
  ctx.beginPath();
  if(ctx.roundRect) ctx.roundRect(x, y, 170, 34, 17);
  else ctx.rect(x, y, 170, 34);
  ctx.stroke();
  ctx.fillStyle = '#000';
  ctx.beginPath();
  if(ctx.roundRect) ctx.roundRect(x + 3, y + 3, 164, 28, 14);
  else ctx.rect(x + 3, y + 3, 164, 28);
  ctx.fill();
  /* end nubs */
  ctx.fillStyle = BRED;
  ctx.fillRect(x - 7, y + 10, 7, 14);
  ctx.fillRect(x + 170, y + 10, 7, 14);
  for(let i = 0; i < 4; i++){
    if(i < P.energy){
      ctx.fillStyle = (i === 0) ? GREY : '#00c800';
      ctx.fillRect(x + 12 + i * 38, y + 8, 30, 18);
    } else {
      ctx.strokeStyle = '#400000'; ctx.lineWidth = 1;
      ctx.strokeRect(x + 12 + i * 38, y + 8, 30, 18);
    }
  }
}

function drawPanel(){
  const x = 616, y = 528, w = 328, h = 148;
  ctx.fillStyle = '#000'; ctx.fillRect(x, y, w, h);
  ctx.strokeStyle = BRED; ctx.lineWidth = 4;
  ctx.strokeRect(x + 2, y + 2, w - 4, h - 4);
  /* ridges right side */
  ctx.lineWidth = 3; ctx.strokeStyle = RED;
  for(let i = 0; i < 6; i++){
    ctx.beginPath();
    ctx.moveTo(x + w - 40, y + 12 + i * 9);
    ctx.lineTo(x + w - 12, y + 12 + i * 9);
    ctx.stroke();
  }
  /* level number box */
  ctx.fillStyle = RED; ctx.fillRect(x + 10, y + 10, 200, 46);
  ctx.fillStyle = '#000'; ctx.fillRect(x + 18, y + 16, 66, 34);
  const ls = String(lvl);
  drawText(ls, x + 51 - textW(ls, 5) / 2, y + 20, 5, '#fff');
  /* lives dots */
  ctx.fillStyle = '#a00000'; ctx.fillRect(x + 92, y + 16, 112, 34);
  for(let i = 0; i < Math.min(6, Math.max(0, P.lives)); i++){
    ctx.fillStyle = '#00f8f8';
    ctx.beginPath(); ctx.arc(x + 106 + i * 18, y + 33, 7, 0, 6.283); ctx.fill();
    ctx.strokeStyle = '#000'; ctx.lineWidth = 1; ctx.stroke();
  }
  /* plasma cell pips (progress to next life) */
  for(let i = 0; i < 5; i++){
    ctx.fillStyle = (i < P.cells % 5) ? '#fff' : '#500000';
    ctx.fillRect(x + 220 + i * 12, y + 40, 8, 8);
  }
  drawText('CELLS', x + 220, y + 22, 2, GREY);
  /* score rows */
  const sc = Math.floor(scoreF);
  const mx = Math.max(hiScore, sc);
  ctx.fillStyle = GREY; ctx.fillRect(x + 10, y + 64, w - 56, 32);
  drawText('SCORE', x + 18, y + 72, 3, '#000');
  const s1 = String(sc);
  drawText(s1, x + w - 66 - textW(s1, 3), y + 72, 3, '#000');
  ctx.fillStyle = GREY; ctx.fillRect(x + 10, y + 102, w - 56, 32);
  drawText('MAX', x + 18, y + 110, 3, '#000');
  const s2 = String(mx);
  drawText(s2, x + w - 66 - textW(s2, 3), y + 110, 3, '#000');
  /* HIGH progress bar under panel */
  drawText('HIGH', x + 14, y + h + 8, 2.5, BRED);
  ctx.strokeStyle = RED; ctx.lineWidth = 2;
  ctx.strokeRect(x + 78, y + h + 8, 200, 12);
  ctx.fillStyle = BRED;
  ctx.fillRect(x + 80, y + h + 10, 196 * clamp(P ? P.u / (ULEN - 8) : 0, 0, 1), 8);
  drawText('O', x + 290, y + h + 8, 2.5, BRED);
}

/* ---------- drawing: screens ---------- */
let demoU = 20;
function render(dt){
  ctx.setTransform(1, 0, 0, 1, 0, 0);
  ctx.fillStyle = '#000'; ctx.fillRect(0, 0, W, H);

  if(state === 'title'){
    if(!terr){ terr = genLevel(1); }
    demoU += 4 * dt;
    if(demoU > ULEN - 20) demoU = 10;
    renderWorld(demoU, VW / 2, false);
    ctx.fillStyle = 'rgba(0,0,0,0.55)'; ctx.fillRect(0, 0, W, H);
    drawLogo(W / 2 - 276, 110, 3);
    const bl = Math.floor(tGlobal * 2) % 2 === 0;
    if(bl) drawText('PRESS SPACE TO START', W / 2 - textW('PRESS SPACE TO START', 3) / 2, 400, 3, '#fff');
    drawText('ARROWS : MOVE', W / 2 - textW('ARROWS : MOVE', 2) / 2, 470, 2, GREY);
    drawText('SPACE : FIRE', W / 2 - textW('SPACE : FIRE', 2) / 2, 500, 2, GREY);
    drawText('P : PAUSE   M : SOUND', W / 2 - textW('P : PAUSE   M : SOUND', 2) / 2, 530, 2, GREY);
    const hs = 'MAX ' + hiScore;
    drawText(hs, W / 2 - textW(hs, 3) / 2, 590, 3, '#00f8f8');
    drawText('A VECTOR HOMAGE TO VORTEX 1989', W / 2 - textW('A VECTOR HOMAGE TO VORTEX 1989', 1.6) / 2, 660, 1.6, MAG);
    return;
  }

  renderWorld(P.u, P.v, true);

  /* HUD */
  drawLogo(16, 14, 1.9);
  drawEnergy(24, 120);
  drawPanel();

  if(introT > 0){
    const s = 'LEVEL ' + lvl;
    ctx.fillStyle = 'rgba(0,0,0,0.5)';
    ctx.fillRect(W / 2 - 180, 300, 360, 70);
    drawText(s, W / 2 - textW(s, 6) / 2, 315, 6, terr.col);
  }
  if(doneT > 0){
    const s = 'SECTOR CLEAR';
    ctx.fillStyle = 'rgba(0,0,0,0.5)';
    ctx.fillRect(W / 2 - 230, 290, 460, 100);
    drawText(s, W / 2 - textW(s, 5) / 2, 305, 5, '#fff');
    const b = 'BONUS ' + (P.cells * 50);
    drawText(b, W / 2 - textW(b, 3) / 2, 350, 3, terr.col);
  }
  if(paused){
    ctx.fillStyle = 'rgba(0,0,0,0.6)'; ctx.fillRect(0, 0, W, H);
    drawText('PAUSED', W / 2 - textW('PAUSED', 6) / 2, H / 2 - 20, 6, '#fff');
  }
  if(state === 'over'){
    ctx.fillStyle = 'rgba(0,0,0,0.7)'; ctx.fillRect(0, 0, W, H);
    drawText('GAME OVER', W / 2 - textW('GAME OVER', 7) / 2, 250, 7, BRED);
    const s1 = 'SCORE ' + Math.floor(scoreF);
    drawText(s1, W / 2 - textW(s1, 3) / 2, 350, 3, '#fff');
    const s2 = 'MAX ' + hiScore;
    drawText(s2, W / 2 - textW(s2, 3) / 2, 390, 3, '#00f8f8');
    if(Math.floor(tGlobal * 2) % 2 === 0)
      drawText('PRESS SPACE', W / 2 - textW('PRESS SPACE', 3) / 2, 470, 3, GREY);
  }
}

/* ---------- main loop ---------- */
let last = performance.now();
function loop(now){
  const dt = Math.min(0.05, (now - last) / 1000);
  last = now;
  update(dt);
  render(dt);
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script>
