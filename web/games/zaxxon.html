<!doctype html>
<html lang="cs">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>ZAXXON — pocta (vektorová)</title>
<style>
  html,body{margin:0;height:100%;background:#05060a;color:#cfe;font-family:"Segoe UI",Arial,sans-serif;}
  #wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100%;gap:10px;padding:12px;box-sizing:border-box;}
  canvas{background:#05060a;border:2px solid #232f3e;border-radius:8px;
    width:min(94vw,900px);height:auto;box-shadow:0 0 50px #0a2440 inset,0 0 30px #06121e;}
  .title{letter-spacing:4px;color:#ffcf40;font-weight:700;}
  .hint{font-size:13px;color:#7fa6c4;text-align:center;max-width:820px;line-height:1.5;}
  .hint b{color:#ffcf40;}
</style>
</head>
<body>
<div id="wrap">
  <div class="title">★ Z A X X O N ★ <span style="color:#7fd6ff;font-size:12px;font-weight:400;">— vektorová pocta izometrickému originálu</span></div>
  <canvas id="c" width="800" height="540"></canvas>
  <div class="hint">
    <b>↑</b> stoupat &nbsp; <b>↓</b> klesat &nbsp; <b>← →</b> úkrok &nbsp; <b>mezerník</b> střelba &nbsp; <b>P</b> pauza<br>
    Sleduj <b>stín na zemi</b> — podle mezery mezi lodí a stínem poznáš výšku. Přeleť nízké zdi, vysokými proleť mezerou, sudy sestřel pro palivo.
  </div>
</div>
<script>
(()=>{
"use strict";
const cv=document.getElementById('c'), g=cv.getContext('2d');
const W=cv.width, H=cv.height;
g.imageSmoothingEnabled=true;   // vektorove, hladke

// ---------- projekce (izometrie jako v originalu) ----------
// forward (rd) = do dalky, nahoru-doprava ; lateral (lat) = napric, dolu-doprava ; alt = vyska
const BX=382, BY=442;
const FX=2.0, FY=1.3;      // hloubka — osa smeruje víc doprava (mělčí náklon jako v originalu)
const LX=72,  LY=30;       // sirka pasu — siroke pole, terén vyplní celé okno
const AZ=4.6;              // vyska
const VIEW=150;            // dohled v hloubkovych jednotkach
const PRD=9;               // hloubka, kde sedi hrac (loz od kraje -> prirozenejsi)
const LATMAX=5.0;          // siroke hrací pole přes celou obrazovku
function proj(lat,alt,rd){
  return { x: BX + rd*FX + lat*LX,
           y: BY - rd*FY + lat*LY - alt*AZ };
}
// natoceni lodi — nos ve směru letu (osa hloubky, nahoru-doprava)
const ROT = Math.atan2(-FY, FX) + Math.PI/2;   // pro hrace
const EROT = ROT + Math.PI;                    // nepratele leti proti (nos dolů-doleva)
// izometrické jednotkové vektory na obrazovce: D = do dálky (hloubka), L = napříč (šířka)
const _Dl=Math.hypot(FX,FY), _Ll=Math.hypot(LX,LY);
const DUX=FX/_Dl, DUY=-FY/_Dl;      // směr hloubky (nahoru-doprava)
const LUX=LX/_Ll, LUY=LY/_Ll;       // směr šířky (dolů-doprava)
// stíhačka ležící naplocho v izo-rovině: f = dopředu (hloubka), s = do strany (šířka)
// dir = +1 hráč (nos do dálky), -1 nepřítel (nos k hráči)
function flatPt(cx,cy,sc,dir,f,s){ f*=dir; return { x:cx+(f*DUX+s*LUX)*sc, y:cy+(f*DUY+s*LUY)*sc }; }
const FIGHTER=[[1.25,0],[-0.55,0.30],[-0.62,0.98],[-0.95,0.86],[-0.80,0],[-0.95,-0.86],[-0.62,-0.98],[-0.55,-0.30]];
function fighterPath2(cx,cy,sc,dir){ g.beginPath();
  FIGHTER.forEach((p,i)=>{ const q=flatPt(cx,cy,sc,dir,p[0],p[1]); i?g.lineTo(q.x,q.y):g.moveTo(q.x,q.y); }); g.closePath(); }

// ---------- barvy ----------
const C={
  // podlaha — modrofialová (periwinkle) jako Atari 400
  gnd1:'#3826a4', gnd2:'#5a46dc', grid:'rgba(150,140,255,0.18)',
  runway:'#5140d0', runwayEdge:'#8a7cff', path:'#ffe24a', zig:'rgba(226,228,255,0.65)',
  // betonovy val / plosina (svetle sede)
  valTop:'#d0d3dc', valFace:'#9a9fac', valDk:'#6a6f7c', valEdge:'#40454f',
  valWin:'#7a1420', valWinLit:'#e8b038',
  // cihlova zed (bílošedé cihly s černou spárou)
  wTop:'#e0e2ea', wFace:'#c2c6d2', wDk:'#9096a4', mortar:'rgba(10,12,20,0.62)',
  // palivova nadrz — oranzovočervený stojatý sud
  drumTop:'#ff9a4a', drumBody:'#e0561c', drumHi:'#ff7a3a', drumRim:'#9c3410', drumBand:'#ffd9a0',
  // radar (zluty talir)
  radar:'#e6c84e', radarDk:'#8a7420', radarLt:'#f6e07a',
  // zelene kostky na levé zdi
  cubeTop:'#4be05c', cubeFace:'#2aa838', cubeDk:'#167a26',
  // nepratelska stihacka (tmava silueta)
  jet:'#161c30', jetHi:'#303a5e', jetCanopy:'#ff4040',
  // hracova lod — bila s rudou zadi
  ship:'#f2f3fa', shipWing:'#d6d9e4', shipStripe:'#c81e1e', shipRear:'#8a1620', canopy:'#26263a', flame:'#ffd23f',
  // kov (věže, děla)
  metLt:'#cfd4de', metMd:'#9aa0ae', metDk:'#666c7a', metEdge:'#3c4048',
  pb:'#ffe24a', eb:'#ff5a5a', shadow:'#0a0820',
  hud:'#ffcf40', warn:'#ff5a5a', good:'#8ce860'
};

// ---------- stav ----------
let state='title', paused=false;
let scroll=0, speed=0.62, levelLen=2400;
let score=0, hi=0, fuel=100, lives=3, bossMode=false, blink=0, planesLeft=20;
const player={lat:0, alt:6, cd:0, inv:0};
let bullets=[], ebullets=[], objs=[], parts=[], stars=[], boss=null;
const keys={};

// ---------- vstup ----------
addEventListener('keydown',e=>{
  if(['ArrowUp','ArrowDown','ArrowLeft','ArrowRight',' '].includes(e.key))e.preventDefault();
  keys[e.key.toLowerCase()]=true; if(e.key===' ')keys[' ']=true;
  if(state==='title'&&(e.key===' '||e.key==='Enter'))startGame();
  else if((state==='dead'||state==='win')&&(e.key===' '||e.key==='Enter'))reset();
  if(e.key.toLowerCase()==='p'&&state==='play')paused=!paused;
});
addEventListener('keyup',e=>{ keys[e.key.toLowerCase()]=false; if(e.key===' ')keys[' ']=false; });
cv.addEventListener('pointerdown',()=>{ if(state==='title')startGame(); else if(state==='dead'||state==='win')reset(); });

// ---------- zvuk ----------
let actx=null; const AC=()=>{ if(!actx){try{actx=new(window.AudioContext||window.webkitAudioContext)();}catch(e){}} return actx; };
function beep(f,d,t='square',v=0.05,sl=0){ const a=AC(); if(!a)return; const o=a.createOscillator(),gn=a.createGain();
  o.type=t;o.frequency.setValueAtTime(f,a.currentTime); if(sl)o.frequency.exponentialRampToValueAtTime(Math.max(40,f+sl),a.currentTime+d);
  gn.gain.setValueAtTime(v,a.currentTime); gn.gain.exponentialRampToValueAtTime(0.0001,a.currentTime+d);
  o.connect(gn);gn.connect(a.destination);o.start();o.stop(a.currentTime+d); }
function noise(d,v=0.12){ const a=AC(); if(!a)return; const n=a.sampleRate*d,b=a.createBuffer(1,n,a.sampleRate),dt=b.getChannelData(0);
  for(let i=0;i<n;i++)dt[i]=(Math.random()*2-1)*(1-i/n); const s=a.createBufferSource();s.buffer=b;
  const gn=a.createGain();gn.gain.value=v;gn.gain.exponentialRampToValueAtTime(0.001,a.currentTime+d); s.connect(gn);gn.connect(a.destination);s.start(); }
const sShoot=()=>beep(900,0.08,'square',0.045,-560);
const sHit=()=>{noise(0.12,0.09);beep(240,0.1,'sawtooth',0.05,-140);};
const sFuel=()=>{beep(523,0.07);setTimeout(()=>beep(784,0.09),70);};
const sCrash=()=>{noise(0.5,0.24);beep(150,0.5,'sawtooth',0.12,-110);};
const sEnemy=()=>beep(320,0.06,'square',0.035,320);

// ---------- level (podle originalnich map) ----------
let spaceZones=[];
const isSpace=(d)=>{ for(const z of spaceZones) if(d>=z[0]&&d<=z[1])return true; return false; };
const rnd=(a,b)=>a+Math.random()*(b-a);

function fortress(dStart, rooms){
  let d=dStart;
  for(let r=0;r<rooms;r++){
    // pricna zed s mezerou (zarez) — deli trat na mistnosti
    objs.push({t:'wall',d,h:rnd(13,17),gap:{c:rnd(-2.6,2.6),w:2.2},dead:false}); d+=46;
    // shluk sudu podel ranveje
    const n=2+((Math.random()*3)|0);
    for(let i=0;i<n;i++) objs.push({t:'fuel',d:d+i*24,lat:rnd(-3.8,3.8),alt:0,dead:false});
    d+=n*24+18;
    // radar / vez / delo
    const roll=Math.random();
    if(roll<0.4){ objs.push({t:'radar',d,lat:rnd(-3.8,3.8),alt:0,ph:Math.random()*6,dead:false}); d+=40; }
    else if(roll<0.72){ objs.push({t:'turret',d,lat:rnd(-3.8,3.8),alt:0,cd:rnd(50,90),dead:false}); d+=40; }
    else { objs.push({t:'cannon',d,lat:rnd(-3.8,3.8),alt:0,cd:rnd(60,100),ang:0.9,dead:false}); d+=44; }
    // obcas nizka zed na preleteni
    if(Math.random()<0.45){ objs.push({t:'wall',d,h:rnd(3,5.5),gap:null,dead:false}); d+=54; }
    // občas silové pole — elektrická bariéra s vodorovnou štěrbinou (proletět v přesné výšce)
    if(Math.random()<0.5){ const lo=rnd(1,6.5); objs.push({t:'field',d,slotLo:lo,slotHi:lo+rnd(4.5,6),dead:false}); d+=58; }
    // obcas stihacka
    if(Math.random()<0.55){ objs.push({t:'plane',d,lat:rnd(-3.3,3.3),alt:rnd(4,12),vx:rnd(-0.015,0.015),dead:false}); d+=42; }
    d+=rnd(46,86);
  }
  return d;
}
function buildLevel(){
  objs=[]; spaceZones=[];
  let d=110;
  d=fortress(d,5);                       // prvni pevnost
  const s0=d+70, s1=s0+360; spaceZones=[[s0,s1]];  // vesmirna pasaz
  for(let dd=s0+50; dd<s1-30; dd+=rnd(48,86)){
    if(Math.random()<0.62) objs.push({t:'plane',d:dd,lat:rnd(-4,4),alt:rnd(6,16),vx:rnd(-0.02,0.02),dead:false});
    else objs.push({t:'fuel',d:dd,lat:rnd(-3.8,3.8),alt:rnd(4,13),dead:false});
  }
  d=s1+70;
  d=fortress(d,6);                       // druha pevnost
  levelLen=d+30;                          // za ni boss
  objs.sort((a,b)=>a.d-b.d);
  planesLeft=objs.filter(o=>o.t==='plane').length;
}
function initStars(){ stars=[]; for(let i=0;i<70;i++)stars.push({x:Math.random()*W,y:Math.random()*180,s:Math.random()<.25?2:1}); }
function startGame(){ AC(); state='play'; }
function reset(){ state='title'; scroll=0; score=0; fuel=100; lives=3; bossMode=false; boss=null;
  player.lat=0; player.alt=6; player.inv=0; bullets=[]; ebullets=[]; parts=[]; buildLevel(); initStars(); }

function boom(x,y,n=16,col=C.wTop){ for(let i=0;i<n;i++){ const a=Math.random()*6.28,sp=Math.random()*3.2+0.6;
  parts.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp-0.5,life:Math.random()*26+14,col}); } }

// ---------- update ----------
function update(){
  if(state!=='play'||paused)return; blink++;
  if(keys['arrowleft']||keys['a'])player.lat-=0.085;
  if(keys['arrowright']||keys['d'])player.lat+=0.085;
  if(keys['arrowup']||keys['w'])player.alt+=0.20;
  if(keys['arrowdown']||keys['s'])player.alt-=0.20;
  player.lat=Math.max(-LATMAX,Math.min(LATMAX,player.lat));
  player.alt=Math.max(0,Math.min(30,player.alt));
  if(player.inv>0)player.inv--;

  if(keys[' ']&&player.cd<=0){ bullets.push({lat:player.lat,alt:player.alt,rd:PRD+2}); sShoot(); player.cd=9; }
  if(player.cd>0)player.cd--;

  fuel-=0.028; if(fuel<=0){ fuel=0; killPlayer(); }
  if(!bossMode){ scroll+=speed; if(scroll>=levelLen-VIEW)enterBoss(); }

  for(const b of bullets)b.rd+=4.6; bullets=bullets.filter(b=>b.rd<VIEW+20);
  for(const b of ebullets){ b.rd-=2.8; b.lat+=b.vl||0; b.alt+=b.va||0; } ebullets=ebullets.filter(b=>b.rd>PRD-8);

  for(const o of objs){
    if(o.dead)continue; const rd=o.d-scroll; if(rd<PRD-14||rd>VIEW+40)continue;
    if(o.t==='plane'){ o.lat+=o.vx; if(o.lat<-LATMAX||o.lat>LATMAX)o.vx*=-1; }
    if(o.t==='turret'&&rd>PRD+6&&rd<VIEW*0.85){ o.cd--; if(o.cd<=0){ o.cd=80+Math.random()*50;
      ebullets.push({lat:o.lat,alt:1,rd, vl:(player.lat-o.lat)*0.004, va:0.10}); sEnemy(); } }
    if(o.t==='cannon'){ o.ang=Math.atan2(player.alt-1,Math.max(0.3,(player.lat-o.lat)*2)+0.6);
      if(rd>PRD+6&&rd<VIEW*0.9){ o.cd--; if(o.cd<=0){ o.cd=95+Math.random()*45;
        const st=Math.max(1,(rd-PRD)/2.6); ebullets.push({lat:o.lat,alt:1,rd, vl:(player.lat-o.lat)/st, va:(player.alt-1)/st}); sEnemy(); } } }
    // strely hrace
    for(const b of bullets){ if(Math.abs(b.rd-rd)<7&&Math.abs(b.lat-(o.lat??0))<0.75){
        if(o.t!=='wall'&&o.t!=='field'&&Math.abs(b.alt-o.alt)<6){ o.dead=true; b.rd=1e9;
          const p=proj(o.lat,o.alt,rd); boom(p.x,p.y,14,o.t==='fuel'?C.good:C.jetCanopy); sHit();
          if(o.t==='fuel'){ fuel=Math.min(100,fuel+26); score+=150; sFuel(); }
          else if(o.t==='turret'){ score+=200; } else if(o.t==='cannon'){ score+=250; }
          else if(o.t==='radar'){ score+=200; }
          else { score+=300; planesLeft=Math.max(0,planesLeft-1); } } } }
    // kolize s hracem
    if(rd<PRD+3&&rd>PRD-4){
      if(o.t==='field'){ if(player.alt<o.slotLo-0.5||player.alt>o.slotHi+0.5)killPlayer(); }
      else if(o.t==='wall'){ const inGap=o.gap&&Math.abs(player.lat-o.gap.c)<o.gap.w;
        if(!inGap&&player.alt<o.h-1.2)killPlayer(); }
      else if(!o.dead&&Math.abs(player.lat-o.lat)<0.7&&Math.abs(player.alt-o.alt)<5){
        if(o.t==='fuel'){ o.dead=true; fuel=Math.min(100,fuel+26); score+=150; sFuel(); const p=proj(o.lat,o.alt,rd); boom(p.x,p.y,10,C.good); }
        else { killPlayer(); o.dead=true; } }
    }
  }
  for(const b of ebullets){ if(b.rd<PRD+3&&b.rd>PRD-4&&Math.abs(b.lat-player.lat)<0.55&&Math.abs(b.alt-player.alt)<5){ b.rd=-99; killPlayer(); } }

  if(bossMode&&boss)updateBoss();
  for(const p of parts){ p.x+=p.vx; p.y+=p.vy; p.vy+=0.08; p.life--; } parts=parts.filter(p=>p.life>0);
  if(score>hi)hi=score;
}
function killPlayer(){ if(player.inv>0)return; const p=proj(player.lat,player.alt,PRD); boom(p.x,p.y,30,C.canopy); sCrash();
  lives--; fuel=Math.max(fuel,30); if(lives<=0)state='dead'; else{ player.inv=100; player.lat=0; player.alt=6; } }

// ---------- boss ----------
function enterBoss(){ bossMode=true; boss={lat:0,alt:9,hp:20,t:0,rd:120}; }
function updateBoss(){ boss.t++; boss.rd=Math.max(70,boss.rd-0.35);
  boss.lat=Math.sin(boss.t*0.02)*3.2; boss.alt=9+Math.sin(boss.t*0.013)*3.5;
  if(boss.t%50===0){ for(let i=-1;i<=1;i++)ebullets.push({lat:boss.lat+i*0.4,alt:boss.alt,rd:boss.rd,vl:(player.lat-boss.lat)*0.003+i*0.01,va:(player.alt-boss.alt)*0.01}); sEnemy(); }
  for(const b of bullets){ if(Math.abs(b.rd-boss.rd)<16&&Math.abs(b.lat-boss.lat)<1.2&&Math.abs(b.alt-boss.alt)<7){ b.rd=1e9; boss.hp--; score+=120;
    const p=proj(boss.lat,boss.alt,boss.rd); boom(p.x,p.y,10,C.jetCanopy); sHit();
    if(boss.hp<=0){ const q=proj(boss.lat,boss.alt,boss.rd); boom(q.x,q.y,60,C.jetCanopy); sCrash(); score+=3000; state='win'; } } }
}

// ================= RENDER (vektorove) =================
function quad(a,b,c,d,fill,stroke){ g.beginPath();g.moveTo(a.x,a.y);g.lineTo(b.x,b.y);g.lineTo(c.x,c.y);g.lineTo(d.x,d.y);g.closePath();
  if(fill){g.fillStyle=fill;g.fill();} if(stroke){g.strokeStyle=stroke;g.lineWidth=1;g.stroke();} }

// izometrický kvádr: střed podstavy v (lat,rd), polovina šířky wl (lat), délka wd (rd), výška h (alt), základna a0
function isoBox(lat,rd,wl,wd,h,cTop,cFront,cSide,edge,a0){
  a0=a0||0; const l=lat-wl, r=lat+wl, n=rd, f=rd+wd, top=a0+h;
  const fbL=proj(l,a0,n), fbR=proj(r,a0,n);
  const ftL=proj(l,top,n), ftR=proj(r,top,n);
  const btL=proj(l,top,f), btR=proj(r,top,f), bbR=proj(r,a0,f);
  quad(ftR,btR,bbR,fbR,cSide,edge);    // pravý bok
  quad(ftL,ftR,fbR,fbL,cFront,edge);   // čelo (ke kameře)
  quad(btL,btR,ftR,ftL,cTop,edge);     // horní plocha
  return {ftL,ftR,btL,btR,fbL,fbR};
}
// svislý válec (screen-space, alt neovlivňuje x → čistě svislý): střed dna (lat,rd), výška h, poloměr rx/ry
function isoCyl(lat,rd,a0,h,rx,ry,cBody,cHi,cDk,cTop){
  const cb=proj(lat,a0,rd), ct=proj(lat,a0+h,rd);
  const gr=g.createLinearGradient(cb.x-rx,0,cb.x+rx,0);
  gr.addColorStop(0,cDk); gr.addColorStop(0.30,cBody); gr.addColorStop(0.5,cHi); gr.addColorStop(0.72,cBody); gr.addColorStop(1,cDk);
  g.fillStyle=gr; g.beginPath();
  g.moveTo(ct.x-rx,ct.y); g.lineTo(ct.x+rx,ct.y); g.lineTo(cb.x+rx,cb.y); g.lineTo(cb.x-rx,cb.y); g.closePath(); g.fill();
  g.fillStyle=cDk; g.beginPath(); g.ellipse(cb.x,cb.y,rx,ry,0,0,6.283); g.fill();   // spodní hrana
  g.fillStyle=cTop||cHi; g.beginPath(); g.ellipse(ct.x,ct.y,rx,ry,0,0,6.283); g.fill(); // víko
  g.strokeStyle=cDk; g.lineWidth=1.2; g.beginPath(); g.ellipse(ct.x,ct.y,rx,ry,0,0,6.283); g.stroke();
  return {cb,ct,rx,ry};
}

function clearBG(){ g.fillStyle='#04040a'; g.fillRect(0,0,W,H);   // cerny vesmir kolem izo-pasu
  // hvězdy jen když je ve výhledu vesmírná pasáž; v pevnosti čistě černá (žádná obloha nad terénem)
  let sp=0,n=0; for(let rd=-10;rd<=VIEW;rd+=14){ n++; if(isSpace(scroll+rd))sp++; }
  const sa=sp/n; if(sa<=0.002)return;
  g.globalAlpha=sa;
  for(const st of stars){ g.fillStyle=st.s>1?'#9fb8d8':'#39496a'; g.fillRect(st.x,st.y,st.s,st.s);}
  g.globalAlpha=1; }

function groundIntervals(){ // useky hloubky [r0,r1] kde je zem (ne vesmir)
  const res=[]; let start=null, step=3, FAR=VIEW+165;   // podlaha až za horní okraj okna → vyplní celý výřez
  for(let rd=-60; rd<=FAR+0.01; rd+=step){ const sp=isSpace(scroll+rd);
    if(!sp&&start===null)start=rd; if(sp&&start!==null){res.push([start,rd-step]);start=null;} }
  if(start!==null)res.push([start,FAR]); return res;
}
function drawGround(){
  for(const [r0,r1] of groundIntervals()){
    if(r1<=r0)continue;
    const a=proj(-LATMAX,0,r0),b=proj(LATMAX,0,r0),c=proj(LATMAX,0,r1),d=proj(-LATMAX,0,r1);
    const gr=g.createLinearGradient(a.x,a.y,c.x,c.y); gr.addColorStop(0,C.gnd2); gr.addColorStop(1,C.gnd1); quad(a,b,c,d,gr);
    // světlejší středový pruh (dráha)
    const RW=3.1;
    const ra=proj(-RW,0.02,r0),rb=proj(RW,0.02,r0),rc=proj(RW,0.02,r1),rd2=proj(-RW,0.02,r1);
    quad(ra,rb,rc,rd2,C.runway);
    g.strokeStyle=C.runwayEdge; g.lineWidth=1.5;
    let e0=proj(-RW,0.03,r0),e1=proj(-RW,0.03,r1); g.beginPath();g.moveTo(e0.x,e0.y);g.lineTo(e1.x,e1.y);g.stroke();
    e0=proj(RW,0.03,r0);e1=proj(RW,0.03,r1); g.beginPath();g.moveTo(e0.x,e0.y);g.lineTo(e1.x,e1.y);g.stroke();
    // mrizka (přes celou šířku)
    g.strokeStyle=C.grid; g.lineWidth=1; const off=scroll%16;
    for(let rd=Math.ceil((r0+off)/16)*16-off; rd<r1; rd+=16){ const l=proj(-LATMAX,0,rd),r=proj(LATMAX,0,rd); g.beginPath();g.moveTo(l.x,l.y);g.lineTo(r.x,r.y);g.stroke(); }
    // žlutá čárkovaná středová čára (posouvá se)
    g.strokeStyle=C.path; g.lineWidth=2.5; g.setLineDash([7,11]); g.lineDashOffset=-scroll*3;
    const p0=proj(0,0.04,r0),p1=proj(0,0.04,r1); g.beginPath();g.moveTo(p0.x,p0.y);g.lineTo(p1.x,p1.y);g.stroke(); g.setLineDash([]);
  }
}
// vlnící se výška levé cihlové zdi (ukotvená ke světu → posouvá se s terénem)
const valH=(wp)=> 9.5 + 3*Math.sin(wp*0.04) + 1.5*Math.sin(wp*0.105+1.1);
function drawVal(){ // levá cihlová zeď s vlnitým vrškem
  const side=-1, l=side*(LATMAX+0.05), lb=l+side*0.34, step=4, MAXH=18;
  const facePath=(r0,r1)=>{ g.beginPath(); let f=true;
    for(let rd=r0; rd<=r1; rd+=step){ const p=proj(l,valH(scroll+rd),rd); f?(g.moveTo(p.x,p.y),f=false):g.lineTo(p.x,p.y); }
    { const p=proj(l,valH(scroll+r1),r1); g.lineTo(p.x,p.y); }
    const pe=proj(l,0,r1),ps=proj(l,0,r0); g.lineTo(pe.x,pe.y); g.lineTo(ps.x,ps.y); g.closePath(); };
  for(const [r0,r1] of groundIntervals()){ if(r1<=r0)continue;
    // horní plocha (mezi l a lb podél vlnitého vršku)
    g.beginPath(); let f=true;
    for(let rd=r0; rd<=r1; rd+=step){ const p=proj(l,valH(scroll+rd),rd); f?(g.moveTo(p.x,p.y),f=false):g.lineTo(p.x,p.y); }
    for(let rd=r1; rd>=r0; rd-=step){ const p=proj(lb,valH(scroll+rd),rd); g.lineTo(p.x,p.y); }
    g.closePath(); g.fillStyle=C.wTop; g.fill();
    // čelní stěna
    facePath(r0,r1); g.fillStyle=C.wFace; g.fill();
    // cihlové spáry — clip na stěnu, vodorovné řady + svislé spáry (podle světa)
    g.save(); facePath(r0,r1); g.clip();
    g.strokeStyle=C.mortar; g.lineWidth=1;
    for(let hv=2.6; hv<MAXH; hv+=2.6){ const a=proj(l,hv,r0),b=proj(l,hv,r1); g.beginPath();g.moveTo(a.x,a.y);g.lineTo(b.x,b.y);g.stroke(); }
    for(let wp=Math.floor((scroll+r0)/5)*5; wp<scroll+r1; wp+=5){ const rd=wp-scroll; if(rd<r0||rd>r1)continue;
      const a=proj(l,0,rd),b=proj(l,MAXH,rd); g.beginPath();g.moveTo(a.x,a.y);g.lineTo(b.x,b.y);g.stroke(); }
    g.restore();
    // tmavá spodní hrana
    g.strokeStyle=C.wDk; g.lineWidth=1.5; const e0=proj(l,0,r0),e1=proj(l,0,r1); g.beginPath();g.moveTo(e0.x,e0.y);g.lineTo(e1.x,e1.y);g.stroke();
  }
}

function drawWall(o,rd){
  const dep=4.5, h=o.h;
  const segs=o.gap?[[-LATMAX,o.gap.c-o.gap.w],[o.gap.c+o.gap.w,LATMAX]]:[[-LATMAX,LATMAX]];
  for(const [l0,l1] of segs){ if(l1<=l0)continue;
    const ftL=proj(l0,h,rd),ftR=proj(l1,h,rd),fbL=proj(l0,0,rd),fbR=proj(l1,0,rd);
    const btL=proj(l0,h,rd+dep),btR=proj(l1,h,rd+dep),bbR=proj(l1,0,rd+dep);
    quad(ftR,btR,bbR,fbR,C.wDk,C.mortar);    // bocni cap
    quad(ftL,ftR,fbR,fbL,C.wFace,C.mortar);  // celni stena
    quad(btL,btR,ftR,ftL,C.wTop,C.mortar);   // horni plocha
    // cihlove spary — vodorovné řady + svislé (střídané) spáry
    g.strokeStyle=C.mortar; g.lineWidth=1;
    const rows=Math.max(2,Math.round(h/2.6));
    for(let i=1;i<rows;i++){ const yv=h*i/rows; const p0=proj(l0,yv,rd),p1=proj(l1,yv,rd); g.beginPath();g.moveTo(p0.x,p0.y);g.lineTo(p1.x,p1.y);g.stroke(); }
    const cols=Math.max(2,Math.round((l1-l0)/0.9));
    for(let i=0;i<rows;i++){ const y0=h*i/rows, y1=h*(i+1)/rows, sh=(i%2)*0.5;
      for(let j=0;j<=cols;j++){ const lv=l0+(l1-l0)*(j+sh)/cols; if(lv<=l0||lv>=l1)continue;
        const p0=proj(lv,y0,rd),p1=proj(lv,y1,rd); g.beginPath();g.moveTo(p0.x,p0.y);g.lineTo(p1.x,p1.y);g.stroke(); } }
  }
}

function groundShadow(lat,rd,rx,ry){ const s=proj(lat,0,rd); g.fillStyle=C.shadow; g.beginPath(); g.ellipse(s.x,s.y,rx,ry,0,0,6.283); g.fill(); return s; }

function drawFuel(o,rd){ const a0=o.alt||0; if(a0<0.5)groundShadow(o.lat,rd,20,9);
  // oranžovočervený stojatý sud s kupolovitým vrškem a stínováním
  const cy=isoCyl(o.lat,rd,a0,7,17,6.5, C.drumBody,C.drumHi,C.drumRim,C.drumTop);
  // dva pruhy kolem sudu
  g.strokeStyle=C.drumBand; g.lineWidth=2.4;
  for(const fr of [0.34,0.66]){ const y=cy.ct.y+(cy.cb.y-cy.ct.y)*fr;
    g.beginPath(); g.ellipse(cy.cb.x,y,cy.rx,cy.ry,0,0.15,Math.PI-0.15,false); g.stroke(); }
}
function drawRadar(o,rd){ groundShadow(o.lat,rd,17,8);
  // štíhlý stožár (3D kvádr, čtvercová stopa)
  isoBox(o.lat,rd,0.28,0.5,8, C.metLt,C.metMd,C.metDk,C.metEdge);
  const t=proj(o.lat,8.4,rd);
  // vzpěra k ohnisku
  g.strokeStyle=C.metDk; g.lineWidth=1.8; g.beginPath(); g.moveTo(t.x,t.y); g.lineTo(t.x+9,t.y-9); g.stroke();
  // velká nakloněná parabolická anténa (mírné "otáčení" změnou šířky)
  const sp=Math.sin((o.ph||0)+blink*0.05)*0.35+0.65;
  g.save(); g.translate(t.x,t.y-3); g.rotate(-0.5); g.scale(sp,1);
  const rg=g.createLinearGradient(-16,0,16,0); rg.addColorStop(0,C.radar); rg.addColorStop(0.5,C.radarLt); rg.addColorStop(1,C.radarDk);
  g.fillStyle=rg; g.beginPath(); g.ellipse(0,0,16,11,0,0,6.283); g.fill();
  g.strokeStyle=C.radarDk; g.lineWidth=1.6; g.beginPath(); g.ellipse(0,0,16,11,0,0,6.283); g.stroke();
  g.fillStyle=C.radarDk; g.beginPath(); g.ellipse(0,0,6,4,0,0,6.283); g.fill();   // ohnisko
  g.restore();
}
function drawTurret(o,rd){ groundShadow(o.lat,rd,18,8);
  // válcová základna + kovová kupole s rudým okem
  isoCyl(o.lat,rd,0,3.2,17,7, C.metMd,C.metLt,C.metDk,C.metMd);
  const c=proj(o.lat,3.2,rd), rx=16;
  const dome=g.createRadialGradient(c.x-5,c.y-4,2,c.x,c.y,rx);
  dome.addColorStop(0,C.metLt); dome.addColorStop(1,C.metMd);
  g.fillStyle=dome; g.beginPath(); g.ellipse(c.x,c.y,rx,rx*0.78,0,Math.PI,2*Math.PI); g.fill();
  g.fillStyle=C.metMd; g.beginPath(); g.ellipse(c.x,c.y,rx,6.5,0,0,6.283); g.fill();
  g.strokeStyle=C.metDk; g.lineWidth=1.2; g.beginPath(); g.ellipse(c.x,c.y,rx,6.5,0,0,6.283); g.stroke();
  const eye=(blink%40<20)?C.jetCanopy:'#ffb0b0'; g.fillStyle=eye;
  g.beginPath(); g.ellipse(c.x,c.y-5,5,3.5,0,0,6.283); g.fill();
}
function drawCannon(o,rd){ groundShadow(o.lat,rd,20,9);
  // mohutná kruhová základna + otočná věž + dlouhá hlaveň mířící na loď
  isoCyl(o.lat,rd,0,2.2,20,8.5, C.metDk,C.metMd,C.metEdge,C.metMd);
  const t=proj(o.lat,2.2,rd), rx=13;
  const dome=g.createRadialGradient(t.x-4,t.y-3,2,t.x,t.y,rx);
  dome.addColorStop(0,C.metLt); dome.addColorStop(1,C.metMd);
  g.fillStyle=dome; g.beginPath(); g.ellipse(t.x,t.y-1,rx,rx*0.8,0,0,6.283); g.fill();
  // hlaveň míří přímo na hráčovu pozici na obrazovce
  const piv={x:t.x,y:t.y-3}, tgt=proj(player.lat,player.alt,PRD);
  const a=Math.atan2(tgt.y-piv.y, tgt.x-piv.x), len=34;

  g.strokeStyle=C.metDk; g.lineWidth=2.4; g.beginPath(); g.moveTo(piv.x,piv.y); g.lineTo(ex,ey); g.stroke();
  g.lineWidth=1; g.lineCap='butt';
  g.fillStyle=C.jetCanopy; g.beginPath(); g.ellipse(t.x,t.y-4,4,3,0,0,6.283); g.fill();
}
function drawPlane(o,rd){ if(!isSpace(scroll+rd))groundShadow(o.lat,rd,20,9);
  const p=proj(o.lat,o.alt,rd), SC=18;
  // plochá stíhačka ležící v izo-rovině, nos k hráči (dir=-1)
  g.fillStyle=C.jet; fighterPath2(p.x,p.y,SC,-1); g.fill(); g.strokeStyle='#0b0e18'; g.lineWidth=1.3; g.stroke();
  const h0=flatPt(p.x,p.y,SC,-1,1.0,0),h1=flatPt(p.x,p.y,SC,-1,-0.55,0.20),h2=flatPt(p.x,p.y,SC,-1,-0.55,-0.20);
  g.fillStyle=C.jetHi; g.beginPath();g.moveTo(h0.x,h0.y);g.lineTo(h1.x,h1.y);g.lineTo(h2.x,h2.y);g.closePath();g.fill();
  const cp=flatPt(p.x,p.y,SC,-1,0.3,0); g.fillStyle=C.jetCanopy; g.beginPath(); g.ellipse(cp.x,cp.y,3,2.4,0,0,6.283); g.fill();
}

function drawShip(){
  const drawIt=!(player.inv>0&&(blink>>2)%2);
  const SC=23;
  // STÍN na zemi (stejný plochý tvar) — mezera k lodi ukazuje výšku
  const sh=proj(player.lat,0,PRD);
  g.fillStyle=C.shadow; fighterPath2(sh.x,sh.y,SC*0.96,1); g.fill();
  // svislá vodicí čára
  const base=proj(player.lat,0,PRD), top=proj(player.lat,player.alt,PRD);
  g.strokeStyle='rgba(150,200,255,0.30)'; g.setLineDash([3,4]); g.beginPath();g.moveTo(base.x,base.y);g.lineTo(top.x,top.y);g.stroke(); g.setLineDash([]);
  if(!drawIt)return;
  const cx=top.x, cy=top.y;
  // plamen z motoru (za lodí = směr -f)
  if((blink>>1)%2){ const a=flatPt(cx,cy,SC,1,-0.9,0.26),b=flatPt(cx,cy,SC,1,-1.7,0),c=flatPt(cx,cy,SC,1,-0.9,-0.26);
    g.fillStyle=C.flame; g.beginPath();g.moveTo(a.x,a.y);g.lineTo(b.x,b.y);g.lineTo(c.x,c.y);g.closePath();g.fill(); }
  // bílé tělo (delta)
  g.fillStyle=C.shipWing; fighterPath2(cx,cy,SC,1); g.fill(); g.strokeStyle='#9aa0b0'; g.lineWidth=1.4; g.stroke();
  // rudá záď (motorový blok)
  const r0=flatPt(cx,cy,SC,1,-0.42,0.26),r1=flatPt(cx,cy,SC,1,-0.42,-0.26),r2=flatPt(cx,cy,SC,1,-0.92,-0.20),r3=flatPt(cx,cy,SC,1,-0.92,0.20);
  g.fillStyle=C.shipRear; g.beginPath();g.moveTo(r0.x,r0.y);g.lineTo(r1.x,r1.y);g.lineTo(r2.x,r2.y);g.lineTo(r3.x,r3.y);g.closePath();g.fill();
  // rudý pruh po trupu
  const s0=flatPt(cx,cy,SC,1,0.75,0),s1=flatPt(cx,cy,SC,1,-0.42,0.12),s2=flatPt(cx,cy,SC,1,-0.42,-0.12);
  g.fillStyle=C.shipStripe; g.beginPath();g.moveTo(s0.x,s0.y);g.lineTo(s1.x,s1.y);g.lineTo(s2.x,s2.y);g.closePath();g.fill();
  // kokpit
  const cp=flatPt(cx,cy,SC,1,0.34,0); g.fillStyle=C.canopy; g.beginPath(); g.ellipse(cp.x,cp.y,4.2,3.2,0,0,6.283); g.fill();
}

function drawField(o,rd){ // elektrická bariéra přes celou šířku s vodorovnou štěrbinou
  const TOP=30, phase=blink*0.35;
  for(const [a0,a1] of [[0,o.slotLo],[o.slotHi,TOP]]){ if(a1<=a0+0.15)continue;
    const bl=proj(-LATMAX,a0,rd),br=proj(LATMAX,a0,rd),tr=proj(LATMAX,a1,rd),tl=proj(-LATMAX,a1,rd);
    g.save();
    g.beginPath();g.moveTo(bl.x,bl.y);g.lineTo(br.x,br.y);g.lineTo(tr.x,tr.y);g.lineTo(tl.x,tl.y);g.closePath();
    const gr=g.createLinearGradient(0,tl.y,0,bl.y); gr.addColorStop(0,'rgba(80,190,255,0.20)'); gr.addColorStop(1,'rgba(40,110,255,0.32)');
    g.fillStyle=gr; g.fill(); g.clip();
    g.strokeStyle='rgba(160,235,255,'+(0.45+0.3*Math.sin(phase))+')'; g.lineWidth=1.4;
    for(let lx=-LATMAX;lx<=LATMAX+0.01;lx+=0.5){ const p0=proj(lx,a0,rd),p1=proj(lx,a1,rd); g.beginPath();g.moveTo(p0.x,p0.y);g.lineTo(p1.x,p1.y);g.stroke(); }
    for(let av=Math.ceil(a0);av<=a1;av+=1.5){ const p0=proj(-LATMAX,av,rd),p1=proj(LATMAX,av,rd); g.beginPath();g.moveTo(p0.x,p0.y);g.lineTo(p1.x,p1.y);g.stroke(); }
    g.restore();
    g.strokeStyle='#a6ecff'; g.lineWidth=2; g.beginPath();g.moveTo(bl.x,bl.y);g.lineTo(br.x,br.y);g.lineTo(tr.x,tr.y);g.lineTo(tl.x,tl.y);g.closePath();g.stroke();
  }
  // zářivé okraje štěrbiny
  g.strokeStyle='#eaffff'; g.lineWidth=2.6;
  const s0=proj(-LATMAX,o.slotLo,rd),s1=proj(LATMAX,o.slotLo,rd); g.beginPath();g.moveTo(s0.x,s0.y);g.lineTo(s1.x,s1.y);g.stroke();
  const s2=proj(-LATMAX,o.slotHi,rd),s3=proj(LATMAX,o.slotHi,rd); g.beginPath();g.moveTo(s2.x,s2.y);g.lineTo(s3.x,s3.y);g.stroke();
  // boční sloupky (kotví pole)
  isoBox(-LATMAX,rd,0.35,1.0,TOP, C.metLt,C.metMd,C.metDk,C.metEdge);
  isoBox( LATMAX,rd,0.35,1.0,TOP, C.metLt,C.metMd,C.metDk,C.metEdge);
}

function drawBoss(){ if(!boss)return; const p=proj(boss.lat,boss.alt,boss.rd); groundShadow(boss.lat,boss.rd,34,15);
  g.fillStyle=C.wTop; g.fillRect(p.x-30,p.y-40,60,52); g.fillStyle='#a7adba'; g.fillRect(p.x-30,p.y-40,60,7);
  g.fillStyle='#e6e8f0'; g.fillRect(p.x-16,p.y-60,32,22);
  const eye=(boss.t%30<15)?C.jetCanopy:'#ffb0b0'; g.fillStyle=eye; g.fillRect(p.x-11,p.y-53,8,8); g.fillRect(p.x+3,p.y-53,8,8);
  g.fillStyle=C.wTop; g.fillRect(p.x-44,p.y-28,14,30); g.fillRect(p.x+30,p.y-28,14,30);
  g.fillStyle=C.jetCanopy; g.fillRect(p.x-44,p.y+2,14,5); g.fillRect(p.x+30,p.y+2,14,5);
  g.fillStyle='#3a0d0d'; g.fillRect(p.x-30,p.y-70,60,5); g.fillStyle=C.warn; g.fillRect(p.x-30,p.y-70,60*(boss.hp/20),5); }

function drawBullets(){ g.lineWidth=2;
  for(const b of bullets){ const a=proj(b.lat,b.alt,b.rd),c=proj(b.lat,b.alt,b.rd-4); g.strokeStyle=C.pb; g.beginPath();g.moveTo(a.x,a.y);g.lineTo(c.x,c.y);g.stroke(); }
  for(const b of ebullets){ const p=proj(b.lat,b.alt,b.rd); g.fillStyle=C.eb; g.beginPath();g.ellipse(p.x,p.y,3,3,0,0,6.283);g.fill(); } g.lineWidth=1; }
function drawParts(){ for(const p of parts){ g.globalAlpha=Math.max(0,p.life/34); g.fillStyle=p.col; g.beginPath();g.ellipse(p.x,p.y,2.4,2.4,0,0,6.283);g.fill(); } g.globalAlpha=1; }

function drawHUD(){
  g.textBaseline='alphabetic';
  // panel
  g.fillStyle='rgba(6,8,14,0.85)'; g.fillRect(0,H-52,W,52);
  g.font='bold 20px Consolas,monospace'; g.textAlign='left';

  // palivo
  g.textAlign='left'; g.fillStyle=C.hud; g.font='bold 15px Consolas,monospace'; g.fillText('FUEL', 20, H-32);
  g.fillStyle='#222838'; g.fillRect(70,H-44,180,12); g.fillStyle=fuel<25?C.warn:C.good; g.fillRect(70,H-44,180*(fuel/100),12);
  g.strokeStyle='#3a4658'; g.strokeRect(70,H-44,180,12);
  // EP / planes + zivoty
  g.textAlign='right'; g.fillStyle=C.hud; g.fillText('EP '+String(planesLeft).padStart(2,'0'), W-20, H-30);
  for(let i=0;i<lives;i++){ g.fillStyle=C.ship; const x=W-30-i*22, y=H-18;
    g.beginPath();g.moveTo(x,y-6);g.lineTo(x-7,y+4);g.lineTo(x,y+1);g.lineTo(x+7,y+4);g.closePath();g.fill(); }
  // vyskomer
  g.fillStyle=C.hud; g.font='bold 12px Consolas,monospace'; g.textAlign='center'; g.fillText('ALT',W-18,60);
  g.fillStyle='#222838'; g.fillRect(W-26,70,10,H-160); const ah=(H-160)*Math.min(1,player.alt/30);
  g.fillStyle=C.canopy; g.fillRect(W-26,70+(H-160)-ah,10,ah);
  // progres
  if(!bossMode){ g.fillStyle='#1a2233'; g.fillRect(20,14,W-40,4); g.fillStyle=C.hud; g.fillRect(20,14,(W-40)*(scroll/(levelLen-VIEW)),4); }
  else { g.fillStyle=C.warn; g.textAlign='center'; g.font='bold 22px Consolas,monospace'; g.fillText('!! ZAXXON !!',W/2,34); }
  if(paused){ g.fillStyle='rgba(0,0,0,0.55)';g.fillRect(0,0,W,H); g.fillStyle=C.hud;g.textAlign='center';g.font='bold 40px Consolas,monospace';g.fillText('PAUZA',W/2,H/2); }
}

function drawScene(){
  clearBG(); drawGround(); drawVal();
  const list=[]; for(const o of objs){ if(o.dead)continue; const rd=o.d-scroll; if(rd<PRD-14||rd>VIEW+40)continue; list.push({rd,o}); }
  list.sort((a,b)=>b.rd-a.rd);
  for(const {rd,o} of list){ if(o.t==='wall')drawWall(o,rd); else if(o.t==='fuel')drawFuel(o,rd);
    else if(o.t==='turret')drawTurret(o,rd); else if(o.t==='cannon')drawCannon(o,rd);
    else if(o.t==='radar')drawRadar(o,rd); else if(o.t==='plane')drawPlane(o,rd);
    else if(o.t==='field')drawField(o,rd); }
  if(bossMode)drawBoss();
  drawBullets(); drawShip(); drawParts(); drawHUD();
}
function drawTitle(){ clearBG(); scroll+=0.35; drawGround(); drawVal();
  g.textAlign='center'; g.fillStyle=C.hud; g.font='bold 60px Consolas,monospace'; g.fillText('ZAXXON', W/2,150);
  g.fillStyle='#7fd6ff'; g.font='16px Segoe UI,Arial'; g.fillText('vektorová pocta izometrickému originálu', W/2,180);
  player.lat=Math.sin(scroll*0.03)*1.4; player.alt=8+Math.sin(scroll*0.05)*4; drawShip();
  g.fillStyle=(blink>>4)%2?C.ship:'#4a5a70'; g.font='bold 22px Consolas,monospace'; g.fillText('STISKNI MEZERNÍK', W/2,H-70);
  g.fillStyle='#7fa6c4'; g.font='14px Segoe UI,Arial'; g.fillText('↑ stoupat · ↓ klesat · ← → úkrok · mezerník střelba', W/2,H-42); blink++; }
function drawEnd(win){ clearBG(); g.textAlign='center';
  g.fillStyle=win?C.good:C.warn; g.font='bold 46px Consolas,monospace'; g.fillText(win?'PEVNOST ZNIČENA!':'GAME OVER', W/2,H/2-30);
  g.fillStyle=C.hud; g.font='22px Consolas,monospace'; g.fillText('SCORE '+score+'    HI '+hi, W/2,H/2+10);
  g.fillStyle=(blink>>4)%2?C.ship:'#4a5a70'; g.font='bold 20px Consolas,monospace'; g.fillText('MEZERNÍK = znovu', W/2,H/2+56); blink++; }

function loop(){ update(); if(state==='title')drawTitle(); else if(state==='play')drawScene(); else drawEnd(state==='win'); requestAnimationFrame(loop); }
reset(); loop();
})();
</script>
